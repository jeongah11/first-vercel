<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 채팅</title>
    <style>
        body {
            margin: 0;
            box-sizing: border-box;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            text-align: center;
        }
        .box-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
        }
        h1 {
            font-size: 20px;
        }
        #ans {
            flex: 1;
            display: flex;
            flex-direction: column-reverse;
            overflow-y: auto;
            text-align: left;
        }
        #ans p {
            width: fit-content;
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 5px #b0b6bb38;
        }
        .prom {
            text-align: right;
            margin-left: auto;
            background: #fffdf0;
        }
        .an {
            background: #e3f7ff;
        }
        .box-prompt {
            display: flex;
            /* align-items: stretch; */
            height: 50px;
            margin: 30px 30px 50px;
            border-radius: 20px;
            border: 1px solid #a8b5bb;
            overflow: hidden;
        }
        #q {
            flex: 1;
            padding: 0 15px;
            line-height: 1.5;
            border: none;
        }
        #q:focus,
        #q:active {
            outline: none;
        }
        #btn {
            padding: 0 15px;
            border: none;
            vertical-align: top;
            background: #000;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box-chat">
            <h1>AI 채팅 (Groq)</h1>
            <div id="ans">
    
            </div>
        </div>
        <div class="box-prompt">
            <input id="q" type="text" placeholder="물어보기">
            <button id="btn">보내기</button>
        </div>
    </div>

    <script>
        document.querySelector("#btn").addEventListener("click", () => {
            const prompt = document.querySelector("#q").value
            
            document.querySelector("#ans").innerHTML += `<p class="prom">${prompt}</p>`
            fetch('/api/chat', {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({prompt})
            })
            .then(res => res.json())
            .then(data => {
                document.querySelector("#ans").innerHTML += `<p class="an">${data.reply}</p>` || `<p>${data.error}</p>`
            })
            .catch(() => {
                document.querySelector("#ans").textContent = "❌ 서버 안 켜짐? (server서 node index.js 먼저)"
            })

            document.querySelector("#q").value = ""
        })

        // 엔터키 눌렀을 때도 반응
        document.querySelector("#q").addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.isComposing) {
                document.querySelector("#btn").click()
            }
        })
    </script>
</body>
</html>
